name: Build APK Windows (Release Version)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Setup Android SDK + NDK
      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platforms;android-33
            build-tools;33.0.2
            ndk;16.1.4479499
            cmake;3.10.2.4988404
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true

      # 4. Enable Windows long paths
      - name: Enable long paths
        shell: powershell
        run: |
          git config --system core.longpaths true
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f

      # 5. Show SDK info
      - name: Show Android SDK info
        shell: cmd
        run: |
          echo ===== ANDROID SDK ROOT =====
          echo %ANDROID_SDK_ROOT%

          echo.
          echo ===== INSTALLED NDKS =====
          dir "%ANDROID_SDK_ROOT%\ndk"

      # 6. Patch Application.mk
      - name: Patch Application.mk
        shell: powershell
        run: |
          @"
          APP_ABI := armeabi-v7a
          APP_PLATFORM := android-21
          APP_MODULES := samp
          APP_STL := c++_static
          APP_CPPFLAGS := -std=c++17
          "@ | Set-Content "client/jni/Application.mk"

      # 7. Patch Android.mk
      - name: Patch Android.mk
        shell: powershell
        run: |
          $file = "client/jni/Android.mk"

          $content = Get-Content $file -Raw

          if ($content -notmatch "LOCAL_CPPFLAGS \+= -std=c\+\+17") {
              $content = $content -replace "include \$\(CLEAR_VARS\)", "include `$(CLEAR_VARS)`r`nLOCAL_CPPFLAGS += -std=c++17`r`nLOCAL_LDLIBS += -latomic"
          }

          Set-Content $file $content

          Write-Host "Android.mk patched successfully"

      # 8. Build libsamp.so
      - name: Build libsamp.so
        shell: cmd
        run: |
          set NDK_PATH=%ANDROID_SDK_ROOT%\ndk\16.1.4479499

          echo.
          echo ===== USING NDK =====
          echo %NDK_PATH%

          if not exist "%NDK_PATH%\ndk-build.cmd" (
            echo ERROR: ndk-build.cmd not found
            exit /b 1
          )

          echo.
          echo ===== ENTER JNI FOLDER =====

          cd client\jni

          echo.
          echo ===== CURRENT DIRECTORY =====
          cd

          echo.
          echo ===== JNI FILES =====
          dir

          if not exist "Android.mk" (
            echo ERROR: Android.mk not found
            exit /b 1
          )

          if not exist "Application.mk" (
            echo ERROR: Application.mk not found
            exit /b 1
          )

          echo.
          echo ===== START NDK BUILD =====

          call "%NDK_PATH%\ndk-build.cmd" ^
            NDK_PROJECT_PATH=. ^
            NDK_APPLICATION_MK=Application.mk ^
            APP_BUILD_SCRIPT=Android.mk ^
            APP_ABI=armeabi-v7a

      # 9. Verify libsamp.so
      - name: Verify libsamp.so
        shell: cmd
        run: |
          echo.
          echo ===== CHECK GENERATED LIB =====

          if exist "client\libs\armeabi-v7a\libsamp.so" (
            echo libsamp.so FOUND
            dir "client\libs\armeabi-v7a"
          ) else (
            echo ERROR: libsamp.so NOT FOUND
            exit /b 1
          )

      # 10. Copy libsamp.so to jniLibs
      - name: Copy libsamp.so
        shell: powershell
        run: |
          $source = "client/libs/armeabi-v7a/libsamp.so"
          $dest = "app/src/main/jniLibs/armeabi-v7a"

          New-Item -ItemType Directory -Force -Path $dest

          if (Test-Path $source) {
              Copy-Item $source "$dest/libsamp.so" -Force
              Write-Host "libsamp.so copied successfully"
          }
          else {
              Write-Host "ERROR: libsamp.so not found"
              exit 1
          }

      # 11. Verify copied library
      - name: Verify copied library
        shell: cmd
        run: |
          echo.
          echo ===== JNI LIBS =====
          dir "app\src\main\jniLibs\armeabi-v7a"

      # 12. Verify Gradle
      - name: Verify Gradle
        shell: cmd
        run: |
          if exist gradlew.bat (
            echo gradlew.bat FOUND
          ) else (
            echo ERROR: gradlew.bat not found
            exit /b 1
          )

      # 13. Build APK
      - name: Build Debug APK
        shell: cmd
        run: |
          call gradlew.bat assembleDebug --stacktrace

      # 14. Verify APK
      - name: Verify APK
        shell: cmd
        run: |
          echo.
          echo ===== APK OUTPUT =====

          if exist "app\build\outputs\apk\debug\app-debug.apk" (
            echo APK BUILD SUCCESS
            dir "app\build\outputs\apk\debug"
          ) else (
            echo ERROR: APK NOT FOUND
            exit /b 1
          )

      # 15. Upload APK Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # 16. Upload APK to GitHub Release
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          tag_name: build-${{ github.run_number }}
          name: Debug Build v${{ github.run_number }}
          body: |
            Latest build from branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
