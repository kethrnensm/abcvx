<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEF Example Web</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="alert-overlay" class="hidden">
        <div class="alert-box">
            <div class="alert-content">
                <div class="alert-icon">
                    <span>?</span>
                </div>
                <div class="alert-title" id="alert-title">Confirm Title</div>
                <div class="alert-message" id="alert-message">Confirm Message</div>
                <div class="alert-buttons">
                    <button id="okay-button" class="okay-button">Okay</button>
                    <button id="cancel-button" class="cancel-button">Cancel</button>
                </div>
            </div>
        </div>
    </div>
      <div id="auth-overlay" class="hidden">
        
        <div id="register-box" class="auth-box hidden">
            <div class="auth-header">Đăng Ký Tài Khoản Mới</div>
            <div class="auth-content">
                <input type="text" id="reg-username" class="auth-input" disabled>
                <input type="password" id="reg-password" class="auth-input" placeholder="Nhập mật khẩu">
                <input type="date" id="reg-dob" class="auth-input" placeholder="Ngày sinh">
                
                <button id="btn-register" class="auth-button" onclick="sendRegister()">Đăng Ký</button>
            </div>
        </div>

        <div id="login-box" class="auth-box hidden">
            <div class="auth-header">Đăng Nhập Game</div>
            <div class="auth-content">
                <input type="text" id="log-username" class="auth-input" disabled>
                <input type="password" id="log-password" class="auth-input" placeholder="Nhập mật khẩu">
                
                <button id="btn-login" class="auth-button" onclick="sendLogin()">Đăng Nhập</button>
            </div>
        </div>

      </div>
    <script src="script.js"></script>
    <script src="auth.js"<>/script>
</body>
</html>
